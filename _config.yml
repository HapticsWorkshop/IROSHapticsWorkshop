title: "IROS 2026 Workshop"
description: "Workshop on Haptics and Dexterous Manipulation"
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
plugins:
  - jekyll-include-cache

minimal_mistakes_skin: "default"
search: false

url: "https://hapticsworkshop.github.io"
baseurl: "/IROSHapticsWorkshop"

markdown: kramdown
permalink: pretty

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
